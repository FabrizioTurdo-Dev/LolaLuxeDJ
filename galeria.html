<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Eventos</title>
    <link rel="stylesheet" href="galeria.css">
</head>


<body>
    <div class="container">
        <!-- Encabezado -->
        <div class="header">
            <h1>Galería de Eventos</h1>
            <p>visualiza los mejores momentos</p>
            <a href="index.html" class="btn-regresar nav-link">Regresar al Inicio</a>
        </div>

        <!-- Galería de imágenes -->
        <div id="galeria" class="galeria-container">
            <div class="loading">Cargando imágenes...</div>
        </div>
    </div>
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <div id="lightbox-content"></div>
    </div>
    <script>

        async function cargarGaleria() {
            try {
                // Detectar si es localhost o producción
                const apiUrl = window.location.hostname === 'localhost'
                    ? 'http://localhost:3000/api/imagenes'
                    : '/api/imagenes';

                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`Error ${response.status}`);
                }

                const data = await response.json();
                const galeriaDiv = document.getElementById("galeria");

                if (!data.success || !data.resources || data.resources.length === 0) {
                    galeriaDiv.innerHTML = '<div class="empty">No hay imágenes aún.</div>';
                    return;
                }

                // Generar HTML para cada imagen
                galeriaDiv.innerHTML = data.resources.map(item => {

                    if (item.resource_type === 'video') {
                        return `
                        <div class="galeria-item">
                        <video
                        preload="metadata"
                        onclick="abrirMedia('${item.url}','video')">
                        <source src="${item.url}" type="video/mp4">
                        </video>
                        </div>`;
                    }

                    return `
        <div class="galeria-item">
            <img
                src="${item.url}?w=300&h=300&c=fill&q=auto"
                alt="Evento"
                loading="lazy"
                onclick="abrirMedia('${item.url}','image')">
        </div>
    `;
                }).join('');

            } catch (error) {
                document.getElementById("galeria").innerHTML = `
                    <div class="error">
                        <p>Error al cargar las imágenes</p>
                    </div>
                `;
            }
        }

        const lightbox = document.getElementById("lightbox");
        const lightboxContent = document.getElementById("lightbox-content");

        function abrirMedia(url, tipo) {

            if (tipo === "video") {
                lightboxContent.innerHTML = `
            <video controls autoplay>
                <source src="${url}">
            </video>
        `;
            } else {
                lightboxContent.innerHTML = `
            <img src="${url}">
        `;
            }

            lightbox.classList.add("active");
        }

        document.querySelector(".close").addEventListener("click", () => {
            lightbox.classList.remove("active");
            lightboxContent.innerHTML = "";
        });

        cargarGaleria();

        // Recargar cada 30 segundos
        setInterval(cargarGaleria, 30000);
    </script>


</body>

</html>
